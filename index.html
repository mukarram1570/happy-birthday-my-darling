<!DOCTYPE html>
<html>
<head>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f0f8ff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }

  .card {
    text-align: center;
    padding: 50px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  h1 {
    color: #ff4757;
    font-size: 3rem;
    margin-bottom: 10px;
  }

  .emoji {
    font-size: 50px;
    display: inline-block;
    animation: bounce 2s infinite;
  }

  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes bounce {
    0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
    40% {transform: translateY(-30px);}
    60% {transform: translateY(-15px);}
  }

  /* Simple CSS Confetti Effect */
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background-color: #ffd700;
    animation: fall 3s linear infinite;
  }

  @keyframes fall {
    to { transform: translateY(100vh) rotate(360deg); }
  }
</style>
</head>
<body>

  <div class="card">
    <div class="emoji">🎂</div>
    <h1>Happy Birthday!</h1>
    <p>Wishing you a day full of logic, laughter, and zero bugs.</p>
    <div class="emoji">🎁</div>
  </div>

  <script>
    for(let i=0; i<30; i++) {
      let div = document.createElement('div');
      div.className = 'confetti';
      div.style.left = Math.random() * 100 + 'vw';
      div.style.backgroundColor = ['#ff4757','#2ed573','#1e90ff','#ffa502'][Math.floor(Math.random()*4)];
      div.style.animationDelay = Math.random() * 3 + 's';
      document.body.appendChild(div);
    }
  </script>

</body>
</html>
